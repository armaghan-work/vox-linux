# vox-linux — Default configuration
# This file is sourced as bash. Override in ~/.config/vox-linux/config.cfg

# ─── Whisper model ────────────────────────────────────────────────────────────
# Options: tiny.en  base.en  small.en  medium.en  large-v3
# base.en  ≈ 148 MB, fast on CPU, good English accuracy
# small.en ≈ 488 MB, better accuracy, slower
VOX_WHISPER_MODEL="base.en"

# ─── Language ─────────────────────────────────────────────────────────────────
# BCP-47 code (en, de, fr, nl, es, ar, …) or "auto" for detection
VOX_LANGUAGE="en"

# ─── Toggle hotkeys ───────────────────────────────────────────────────────────
# Hotkeys for toggle mode (press to start recording, press again to stop).
# Format: GNOME/GTK accelerator notation
#   <Primary> = Ctrl,  <Alt> = Alt,  <Super> = Win/Meta
# To apply after changing: ./setup/hotkeys.sh  (from the vox-linux directory)
VOX_HOTKEY_TYPE="<Primary><Alt>v"
VOX_HOTKEY_SUGGEST="<Primary><Alt>s"

# ─── Display server ───────────────────────────────────────────────────────────
# auto  = detected from $XDG_SESSION_TYPE / $WAYLAND_DISPLAY
# wayland | x11
VOX_DISPLAY_SERVER="auto"

# ─── Audio backend ────────────────────────────────────────────────────────────
# auto = first available: pipewire → pulseaudio → alsa
# pipewire | pulseaudio | alsa
VOX_AUDIO_BACKEND="auto"

# ─── Typing / text injection tool ─────────────────────────────────────────────
# auto = wayland→ydotool (fallback wtype) / x11→xdotool
# ydotool | wtype | xdotool | clipboard_only
VOX_TYPING_TOOL="auto"

# ─── Clipboard tool ───────────────────────────────────────────────────────────
# auto = wayland→wl-copy / x11→xclip (fallback xsel)
# wl-copy | xclip | xsel | none
VOX_CLIPBOARD_TOOL="auto"

# ─── ydotool socket path ──────────────────────────────────────────────────────
# Used only when VOX_TYPING_TOOL=ydotool
YDOTOOL_SOCKET="/tmp/.ydotool_socket"

# ─── Suggest command ──────────────────────────────────────────────────────────
# The CLI command used by 'suggest' mode (Ctrl+Alt+S or PTT suggest key).
# Your speech is appended as a quoted argument: VOX_SUGGEST_CMD "your words"
#
# Default: GitHub Copilot (requires: gh extension install github/gh-copilot)
VOX_SUGGEST_CMD="copilot -i"
#
# Other options — uncomment one, or set your own:
# VOX_SUGGEST_CMD="gemini"                    # Google Gemini CLI
# VOX_SUGGEST_CMD="claude"                    # Anthropic Claude CLI
# VOX_SUGGEST_CMD="llm"                       # Simon Willison's multi-model CLI
# VOX_SUGGEST_CMD="aichat"                    # aichat (supports Groq, Claude, Gemini…)
# VOX_SUGGEST_CMD="groq"                      # Groq CLI

# ─── Push-to-talk (PTT) keys ──────────────────────────────────────────────────
# Hold a key to record; release to transcribe.
# Use evdev KEY_* names. Examples: KEY_F9  KEY_F8  KEY_RIGHTCTRL
# Modifier combos:  KEY_RIGHTCTRL+KEY_F9  (hold Right Ctrl + F9)
#
# IMPORTANT: PTT keys must NOT be registered as GNOME/KDE toggle hotkeys.
#            If they are, both handlers fire on press. Remove the conflict first.
#
# After changing, run: vox-ptt restart

# Hold to record → release types text at cursor (voice-to-text)
VOX_PTT_TYPE_KEY="KEY_F9"

# Hold to record → release runs AI suggest command in terminal
# Empty string = disabled
VOX_PTT_SUGGEST_KEY="KEY_F8"

